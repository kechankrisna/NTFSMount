name: CI

# Runs on every push and pull request to main — catches build errors early.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build check
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build
        working-directory: NTFSMount

      - name: Build (release)
        run: swift build -c release
        working-directory: NTFSMount

      - name: Verify binary exists
        run: |
          test -f NTFSMount/.build/release/NTFSMount \
            && echo "✓ Binary built successfully" \
            || (echo "✗ Binary not found" && exit 1)
