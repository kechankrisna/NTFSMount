name: CI

# Build check on every push and pull request to main.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build check
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      # Package.swift is at the repo root — no working-directory needed.
      - name: Build (debug)
        run: swift build

      - name: Build (release)
        run: swift build -c release

      - name: Verify binary exists
        run: |
          test -f .build/release/NTFSMount \
            && echo "✓ Binary built successfully" \
            || (echo "✗ Binary not found" && exit 1)
