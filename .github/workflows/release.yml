name: Release

# Triggers when you push a version tag: git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write   # required to create GitHub Releases and upload assets

jobs:
  build-dmg:
    name: Build · Package · Release
    runs-on: macos-14   # macOS 14 Sonoma — matches the app's deployment target

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Build universal binary (arm64 + x86_64) ─────────────────────────
      - name: Build arm64
        run: swift build -c release --arch arm64
        working-directory: NTFSMount

      - name: Build x86_64
        run: swift build -c release --arch x86_64
        working-directory: NTFSMount

      - name: Lipo — combine into universal binary
        working-directory: NTFSMount
        run: |
          lipo -create -output NTFSMount-universal \
            .build/arm64-apple-macosx/release/NTFSMount \
            .build/x86_64-apple-macosx/release/NTFSMount
          file NTFSMount-universal   # confirm it is fat binary

      # ── 3. Assemble .app bundle ────────────────────────────────────────────
      - name: Assemble NTFSMount.app
        working-directory: NTFSMount
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"      # strip leading 'v'  e.g. v1.2.3 → 1.2.3

          APP="NTFSMount.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"

          # Executable
          cp NTFSMount-universal "$APP/Contents/MacOS/NTFSMount"
          chmod +x "$APP/Contents/MacOS/NTFSMount"

          # Info.plist — patch in real version string
          sed "s/<string>1\.0\.0<\/string>/<string>${VERSION}<\/string>/g; \
               s/<string>1<\/string>/<string>${VERSION}<\/string>/g" \
            Sources/NTFSMount/Info.plist > "$APP/Contents/Info.plist"

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "APP=$APP"         >> "$GITHUB_ENV"

      # ── 4. Ad-hoc code sign ────────────────────────────────────────────────
      # Ad-hoc signing ("-") works without an Apple Developer account.
      # Users must right-click → Open the first time to bypass Gatekeeper.
      # Replace "-" with your "Developer ID Application: ..." cert name for
      # notarized builds that open without any warning.
      - name: Code sign (ad-hoc)
        working-directory: NTFSMount
        run: |
          codesign --force --deep --sign - \
                   --options runtime \
                   --entitlements scripts/entitlements.plist \
                   NTFSMount.app

      # ── 5. Build DMG ───────────────────────────────────────────────────────
      - name: Create DMG
        working-directory: NTFSMount
        run: |
          DMG="NTFSMount-v${{ env.VERSION }}.dmg"

          # Staging folder: app + Applications symlink for drag-install UX
          mkdir -p dmg_staging
          cp -r NTFSMount.app dmg_staging/
          ln -sf /Applications dmg_staging/Applications

          hdiutil create \
            -volname  "NTFSMount ${{ env.VERSION }}" \
            -srcfolder dmg_staging \
            -ov \
            -format   UDZO \
            -fs       HFS+ \
            "$DMG"

          echo "DMG=$DMG" >> "$GITHUB_ENV"

          # Print SHA-256 for the release notes
          shasum -a 256 "$DMG"

      # ── 6. Create GitHub Release and attach DMG ────────────────────────────
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "NTFSMount v${{ env.VERSION }}"
          body: |
            ## NTFSMount v${{ env.VERSION }}

            Free, open-source NTFS read/write for macOS.
            **Author:** KECHANKRISNA · ke.chankrisna168@gmail.com

            ---

            ### 📥 Installation

            1. Download **`NTFSMount-v${{ env.VERSION }}.dmg`** below
            2. Open the DMG and drag **NTFSMount.app** → **Applications**
            3. **First launch only:** right-click the app → **Open** to bypass Gatekeeper
               *(This is a free, ad-hoc-signed build — no Apple Developer subscription required)*

            ### ✅ Requirements

            - macOS 14 Sonoma or later (Apple Silicon or Intel)
            - **macFUSE** kernel extension:
              ```
              brew install --cask macfuse
              ```
              Then approve in System Settings → Privacy & Security
            - **ntfs-3g** filesystem driver:
              ```
              brew install gromgit/fuse/ntfs-3g-mac
              ```

            See [USER_GUIDE.md](https://github.com/${{ github.repository }}/blob/main/NTFSMount/USER_GUIDE.md) for full setup instructions.

            ---

            ### 🔒 SHA-256 Checksum
            ```
            $(shasum -a 256 NTFSMount/NTFSMount-v${{ env.VERSION }}.dmg | awk '{print $1}')  NTFSMount-v${{ env.VERSION }}.dmg
            ```
          draft: false
          prerelease: false
          files: NTFSMount/${{ env.DMG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
